<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OpenZerg — Demo Console</title>
<style>
  :root {
    --bg: #08090b;
    --panel: #0d0f12;
    --panel-strong: #111318;
    --panel-soft: #101216;
    --border: #25282d;
    --border-hover: #3f444c;
    --ink: #f4f4f5;
    --muted: #71717a;
    --dim: #a1a1aa;
    --accent: #f4f4f5;
    --hold:   #86efac;
    --breach: #fca5a5;
    --warn:   #fde68a;
    --orange: #fdba74;
    --fs:     #fdba74;
    --net:    #93c5fd;
    --priv:   #c4b5fd;
    --res:    #f9a8d4;
    --sec:    #99f6e4;
    --ease-out: cubic-bezier(0.23, 1, 0.32, 1);
    --ease-in-out: cubic-bezier(0.77, 0, 0.175, 1);
    --mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
    --sans: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100vh; background: var(--border); color: var(--ink);
               font-family: var(--sans); overflow: hidden; }

  .shell {
    display: grid;
    grid-template-columns: minmax(280px, 1fr) minmax(420px, 2fr) minmax(320px, 1fr);
    grid-template-rows: auto auto 1fr auto;
    height: 100vh; width: 100vw; gap: 1px;
    background: var(--border);
  }

  /* Top: generation pill bar */
  .gen-pill-bar {
    grid-column: 1 / span 3; grid-row: 2;
    display: flex; align-items: center; gap: 10px;
    padding: 12px 16px; background: var(--panel);
    font-size: 12px; min-height: 48px;
  }
  .gen-pill-bar .label {
    color: var(--dim); font-size: 11px; letter-spacing: 0.13em;
    text-transform: uppercase; font-weight: 700; margin-right: 6px;
  }
  .gen-pill-bar .pill {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 6px 12px; border-radius: 0;
    border: 1px solid var(--border); background: var(--panel-soft);
    color: var(--dim); font-size: 12px; font-weight: 680;
    transition: background 140ms var(--ease-out), border-color 140ms var(--ease-out);
    font-variant-numeric: tabular-nums;
  }
  .gen-pill-bar .pill.active {
    border-color: var(--ink); color: var(--ink); background: var(--panel-strong);
    animation: pillpulse 1.6s var(--ease-in-out) infinite;
  }
  .gen-pill-bar .pill.done { color: var(--ink); border-color: var(--border-hover); }
  .gen-pill-bar .pill.has-breach { border-color: #7f1d1d; }
  .gen-pill-bar .pill .breach-badge {
    background: transparent; color: var(--breach);
    padding: 0 6px; border-radius: 0; border: 1px solid currentColor;
    font-size: 10px; font-weight: 700; letter-spacing: 0.06em;
  }
  .gen-pill-bar .pill .surv {
    color: var(--hold); font-size: 11px; font-weight: 600;
  }
  .gen-pill-bar .sep { color: var(--muted); }
  .gen-pill-bar .final {
    margin-left: 10px; padding: 6px 12px;
    background: #07140d;
    border: 1px solid #14532d; border-radius: 0;
    color: var(--hold); font-size: 11px; font-weight: 760; letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .gen-pill-bar .final.breach { background: #1c0d0d; border-color: #7f1d1d; color: var(--breach); }
  @keyframes pillpulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(244, 244, 245, 0.18); }
    50%      { box-shadow: 0 0 0 6px rgba(244, 244, 245, 0); }
  }

  /* Defense posture strip (CON-341) */
  .defense-strip {
    grid-column: 1 / span 3; grid-row: 1;
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    padding: 10px 16px; background: var(--panel-strong);
    font-size: 11px; min-height: 38px;
  }
  .defense-strip .label {
    color: var(--dim); font-size: 11px; letter-spacing: 0.13em;
    text-transform: uppercase; font-weight: 700;
  }
  .defense-strip select {
    background: var(--panel-soft); color: var(--ink);
    border: 1px solid var(--border); border-radius: 0;
    padding: 5px 10px; font-family: var(--sans); font-size: 11px;
    letter-spacing: 0.04em; cursor: pointer; font-weight: 600;
  }
  .defense-strip select:hover { border-color: var(--border-hover); }
  .defense-strip .layer {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 9px; border-radius: 0;
    background: var(--panel-soft); border: 1px solid var(--border);
    color: var(--muted); font-size: 11px;
  }
  .defense-strip .layer.on  { color: var(--hold); border-color: #14532d; }
  .defense-strip .layer.off { color: var(--muted); opacity: 0.55; text-decoration: line-through; }
  .defense-strip .layer .mark { font-weight: 700; }
  .defense-strip .count {
    color: var(--ink); font-weight: 760; margin-left: auto;
    font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase;
    font-variant-numeric: tabular-nums;
  }
  .defense-strip .count.permissive { color: var(--warn); }
  .defense-strip .count.hardened   { color: var(--hold); }

  /* Defender Report drawer (CON-337) */
  .defender-drawer {
    position: fixed; left: 0; right: 0; bottom: 0;
    background: var(--panel);
    border-top: 1px solid var(--border);
    box-shadow: 0 -8px 30px rgba(0, 0, 0, 0.5);
    transform: translateY(110%);
    transition: transform 0.45s cubic-bezier(0.22, 1, 0.36, 1);
    z-index: 30;
    padding: 18px 28px 22px;
    max-height: 60vh; overflow-y: auto;
    font-size: 12px;
  }
  .defender-drawer.open { transform: translateY(0); }
  .defender-drawer .drawer-header {
    display: flex; align-items: baseline; gap: 14px; margin-bottom: 14px;
    border-bottom: 1px solid var(--border); padding-bottom: 10px;
  }
  .defender-drawer .drawer-title {
    font-size: 12px; letter-spacing: 0.13em; text-transform: uppercase;
    color: var(--ink); font-weight: 760;
  }
  .defender-drawer .drawer-summary {
    font-size: 12px; color: var(--dim); font-variant-numeric: tabular-nums;
  }
  .defender-drawer .drawer-summary b.bad  { color: var(--breach); }
  .defender-drawer .drawer-summary b.good { color: var(--hold); }
  .defender-drawer .drawer-close {
    margin-left: auto;
    background: transparent; color: var(--dim);
    border: 1px solid var(--border); border-radius: 4px;
    padding: 4px 10px; cursor: pointer; font-family: inherit; font-size: 11px;
  }
  .defender-drawer .drawer-close:hover { color: var(--ink); border-color: var(--ink); }
  .defender-drawer .breach-row {
    display: grid; grid-template-columns: 16px 200px 1fr; gap: 14px;
    padding: 8px 0; border-bottom: 1px dashed #1f2937;
    align-items: baseline;
  }
  .defender-drawer .breach-row .mark { color: var(--breach); font-weight: 700; }
  .defender-drawer .breach-row .vector {
    color: var(--ink); font-weight: 680; font-size: 13px;
  }
  .defender-drawer .breach-row .vector .cat {
    color: var(--muted); font-size: 11px; font-weight: 500;
    display: block; margin-top: 3px; letter-spacing: 0.08em; text-transform: uppercase;
  }
  .defender-drawer .breach-row .fix {
    color: var(--hold); font-family: var(--mono); font-size: 12px;
  }
  .defender-drawer .breach-row .fix::before {
    content: '→ '; color: var(--muted); margin-right: 4px;
  }
  .defender-drawer .drawer-empty {
    padding: 16px 0; color: var(--hold); font-size: 13px;
    text-align: center; letter-spacing: 1px;
  }
  .defender-drawer .drawer-actions {
    display: flex; gap: 10px; margin-top: 16px;
    padding-top: 12px; border-top: 1px solid var(--border);
  }
  .defender-drawer .drawer-actions button {
    background: var(--ink); color: var(--bg);
    border: 1px solid var(--ink); border-radius: 0;
    padding: 10px 16px; font-family: var(--sans); font-size: 12px;
    letter-spacing: 0.04em; font-weight: 760; cursor: pointer;
    transition: background 140ms var(--ease-out), border-color 140ms var(--ease-out), transform 100ms var(--ease-out);
  }
  .defender-drawer .drawer-actions button.secondary {
    background: var(--panel-strong); color: var(--ink); border-color: var(--border);
  }
  .defender-drawer .drawer-actions button:active { transform: scale(0.98); }
  .defender-drawer .drawer-actions button.secondary:hover { border-color: var(--border-hover); }

  /* Mutation receipt toasts (CON-335) */
  .mutation-toasts {
    position: fixed; top: 80px; right: 18px;
    display: flex; flex-direction: column; gap: 8px;
    z-index: 25; pointer-events: none;
    max-width: 340px;
  }
  .mutation-toast {
    background: var(--panel);
    border: 1px solid var(--border);
    border-left: 2px solid var(--warn);
    box-shadow: 0 4px 18px rgba(0, 0, 0, 0.4);
    border-radius: 0;
    padding: 12px 14px;
    font-size: 12px; line-height: 1.5;
    color: var(--ink);
    opacity: 0; transform: translateX(20px);
    animation: toastIn 0.4s var(--ease-out) forwards, toastOut 0.6s var(--ease-in-out) 6.5s forwards;
  }
  .mutation-toast .toast-header {
    display: flex; justify-content: space-between; align-items: baseline;
    color: var(--warn); font-size: 10px; font-weight: 760;
    letter-spacing: 0.13em; text-transform: uppercase; margin-bottom: 6px;
  }
  .mutation-toast .toast-header .latency {
    color: var(--muted); font-weight: 400; letter-spacing: 0.04em; text-transform: none;
    font-variant-numeric: tabular-nums;
  }
  .mutation-toast .toast-body { color: var(--ink); font-size: 12px; line-height: 1.5; }
  .mutation-toast .toast-meta {
    margin-top: 8px; padding-top: 8px;
    border-top: 1px solid var(--border);
    color: var(--muted); font-size: 11px;
    font-variant-numeric: tabular-nums;
  }
  @keyframes toastIn {
    from { opacity: 0; transform: translateX(20px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  @keyframes toastOut {
    from { opacity: 1; transform: translateX(0); }
    to   { opacity: 0; transform: translateX(20px); }
  }

  /* Attacker Hall of Fame (CON-340) */
  .hof-toggle {
    background: var(--panel-strong); color: var(--ink);
    border: 1px solid var(--border); border-radius: 0;
    padding: 8px 12px; font-family: var(--sans); font-size: 12px;
    letter-spacing: 0.02em; cursor: pointer; font-weight: 600;
    transition: border-color 140ms var(--ease-out), background 140ms var(--ease-out);
  }
  .hof-toggle:hover { border-color: var(--border-hover); background: #171a20; }
  .hof-panel {
    position: fixed; top: 0; right: 0; bottom: 0;
    width: 440px; background: var(--panel);
    border-left: 1px solid var(--border);
    box-shadow: -8px 0 30px rgba(0, 0, 0, 0.5);
    transform: translateX(110%);
    transition: transform 0.35s var(--ease-out);
    z-index: 28;
    padding: 20px 22px;
    overflow-y: auto;
    font-size: 12px;
  }
  .hof-panel.open { transform: translateX(0); }
  .hof-panel .hof-header {
    display: flex; align-items: baseline; gap: 12px;
    border-bottom: 1px solid var(--border); padding-bottom: 12px; margin-bottom: 14px;
  }
  .hof-panel .hof-title {
    font-size: 11px; letter-spacing: 0.13em; text-transform: uppercase;
    color: var(--ink); font-weight: 760;
  }
  .hof-panel .hof-subtitle {
    font-size: 11px; color: var(--muted); letter-spacing: 0.02em;
  }
  .hof-panel .hof-close {
    margin-left: auto;
    background: var(--panel-strong); color: var(--dim);
    border: 1px solid var(--border); border-radius: 0;
    padding: 5px 10px; cursor: pointer; font-family: var(--sans); font-size: 11px;
    letter-spacing: 0.06em; font-weight: 600;
  }
  .hof-panel .hof-close:hover { color: var(--ink); border-color: var(--border-hover); }
  .hof-panel .hof-sort {
    display: flex; gap: 6px; margin-bottom: 14px;
  }
  .hof-panel .hof-sort button {
    background: var(--panel-soft); color: var(--dim);
    border: 1px solid var(--border); border-radius: 0;
    padding: 5px 10px; font-family: var(--sans); font-size: 11px;
    letter-spacing: 0.06em; cursor: pointer; text-transform: uppercase; font-weight: 700;
  }
  .hof-panel .hof-sort button.active {
    color: var(--ink); border-color: var(--ink); background: var(--panel-strong);
  }
  .hof-panel .hof-row {
    display: grid; grid-template-columns: 24px 1fr auto auto;
    gap: 10px; padding: 8px 0;
    border-bottom: 1px dashed #1f2937;
    align-items: baseline;
  }
  .hof-panel .hof-row .rank {
    color: var(--dim); font-weight: 700; font-size: 12px;
  }
  .hof-panel .hof-row.top1 .rank { color: var(--warn); }
  .hof-panel .hof-row.top2 .rank { color: var(--orange); }
  .hof-panel .hof-row.top3 .rank { color: var(--dim); }
  .hof-panel .hof-row .vector {
    color: var(--ink); font-weight: 600;
  }
  .hof-panel .hof-row .vector .cat {
    display: block; font-size: 9px; color: var(--dim);
    letter-spacing: 1px; margin-top: 2px;
  }
  .hof-panel .hof-row .vector .cat.filesystem { color: var(--fs); }
  .hof-panel .hof-row .vector .cat.network    { color: var(--net); }
  .hof-panel .hof-row .vector .cat.privilege  { color: var(--priv); }
  .hof-panel .hof-row .vector .cat.secrets    { color: var(--sec); }
  .hof-panel .hof-row .vector .cat.resource   { color: var(--res); }
  .hof-panel .hof-row .fit {
    color: var(--accent); font-family: monospace; font-size: 11px;
  }
  .hof-panel .hof-row .breaches {
    color: var(--breach); font-weight: 700; font-size: 11px;
  }
  .hof-panel .hof-row .breaches.zero { color: var(--dim); font-weight: 400; }
  .hof-panel .hof-empty {
    color: var(--dim); text-align: center; padding: 24px 0;
    font-style: italic; letter-spacing: 1px;
  }

  /* Breach lineage banner (CON-336) */
  .lineage-banner {
    position: fixed; left: 50%; top: 100px;
    transform: translateX(-50%) translateY(-180%);
    width: min(720px, 90vw);
    background: var(--panel);
    border: 1px solid var(--border);
    border-top: 2px solid var(--breach);
    border-radius: 0;
    box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
    padding: 18px 22px;
    z-index: 32;
    opacity: 0;
    transition: transform 0.45s var(--ease-out), opacity 0.45s;
  }
  .lineage-banner.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  .lineage-banner .lineage-title {
    font-size: 11px; letter-spacing: 4px; color: var(--breach);
    font-weight: 700; margin-bottom: 10px;
    display: flex; justify-content: space-between; align-items: baseline;
  }
  .lineage-banner .lineage-title .vector {
    color: var(--ink); letter-spacing: 2px; font-size: 16px;
  }
  .lineage-banner .lineage-chain {
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    font-family: 'JetBrains Mono', monospace; font-size: 12px;
  }
  .lineage-banner .lineage-node {
    padding: 7px 11px; border-radius: 0;
    background: var(--panel-soft); border: 1px solid var(--border);
    color: var(--muted); font-variant-numeric: tabular-nums;
  }
  .lineage-banner .lineage-node.fired { color: var(--ink); border-color: var(--border-hover); }
  .lineage-banner .lineage-node.breach {
    color: var(--breach); border-color: #7f1d1d;
    background: #1c0d0d;
    font-weight: 760;
  }
  .lineage-banner .lineage-arrow {
    color: var(--dim); font-weight: 700;
  }
  .lineage-banner .lineage-mutation {
    color: var(--warn); font-size: 11px;
    margin-top: 10px; padding-top: 8px;
    border-top: 1px dashed #1f2937; letter-spacing: 0.5px;
  }
  .lineage-banner .lineage-mutation .label {
    color: var(--dim); letter-spacing: 2px; font-weight: 700; margin-right: 6px;
  }
  .panel { position: relative; overflow: hidden; background: var(--panel); }
  .panel header {
    position: sticky; top: 0; z-index: 5;
    background: var(--panel-strong); padding: 13px 14px;
    border-bottom: 1px solid var(--border);
    font-size: 11px; letter-spacing: 0.13em; text-transform: uppercase;
    color: var(--dim); font-weight: 700;
    display: flex; justify-content: space-between; align-items: center;
  }
  .panel header .badge {
    font-size: 11px; padding: 4px 8px; border-radius: 0;
    background: transparent; color: var(--dim);
    border: 1px solid var(--border); letter-spacing: 0.08em; text-transform: uppercase;
  }
  .panel header .badge.live   { color: var(--hold); }
  .panel header .badge.replay { color: var(--warn); }
  .panel header .badge.idle   { color: var(--dim); }
  .panel header .badge.error  { color: var(--breach); }

  /* Left: kubectl pane */
  .panel-left { grid-column: 1; grid-row: 3; }
  .pod-table {
    width: 100%; font-size: 12px; border-collapse: collapse;
    color: var(--ink); font-variant-numeric: tabular-nums;
  }
  .pod-table thead th {
    text-align: left; padding: 10px 14px; color: var(--muted);
    border-bottom: 1px solid var(--border); position: sticky; top: 45px;
    background: var(--panel); font-weight: 700;
    font-size: 11px; letter-spacing: 0.13em; text-transform: uppercase;
  }
  .pod-table tbody td { padding: 8px 14px; border-bottom: 1px solid var(--border); }
  .pod-table tbody tr.fresh { animation: fadein 240ms var(--ease-out); }
  @keyframes fadein { from { background: rgba(244,244,245,0.04); } to { background: transparent; } }
  .pod-status.Pending   { color: var(--muted); }
  .pod-status.Running   { color: var(--warn); }
  .pod-status.Completed { color: var(--hold); }
  .pod-status.Completed.breach { color: var(--breach); }
  .pod-meta { padding: 12px 14px; font-size: 11px; color: var(--muted);
              border-top: 1px solid var(--border); position: absolute; bottom: 0; left: 0; right: 0;
              background: var(--panel-strong); letter-spacing: 0.02em; line-height: 1.55; }
  .pod-meta b { color: var(--ink); font-weight: 680; }
  .generation-banner {
    padding: 10px 14px; margin: 8px 14px 0;
    background: var(--panel-soft); border: 1px solid var(--border);
    border-left: 2px solid var(--warn);
    color: var(--ink); font-size: 11px; font-weight: 760; letter-spacing: 0.13em;
    text-transform: uppercase;
  }

  /* Center: map iframe */
  .panel-center { grid-column: 2; grid-row: 3; padding: 0; }
  .panel-center iframe { width: 100%; height: 100%; border: 0; display: block; background: #090a0c; }

  /* Right: terminal pane */
  .panel-right { grid-column: 3; grid-row: 3; }
  .terminal {
    height: calc(100% - 45px); padding: 12px;
    font-size: 11px; line-height: 1.55; color: var(--dim);
    overflow-y: auto; overflow-x: hidden;
    background: #090a0c;
    font-family: var(--mono);
  }
  .terminal .line { white-space: pre-wrap; word-break: break-word; }
  .terminal .line.log { color: var(--dim); }
  .terminal .line.result-held   { color: var(--hold); }
  .terminal .line.result-breach { color: var(--breach); font-weight: 600; }
  .terminal .line.system { color: #d4d4d8; opacity: 0.8; }
  .terminal .line.generation { color: var(--orange); font-weight: 700; }
  .terminal .line.survivor   { color: var(--warn); }
  .terminal::-webkit-scrollbar { width: 8px; }
  .terminal::-webkit-scrollbar-thumb { background: var(--border); border-radius: 0; }
  .terminal::-webkit-scrollbar-thumb:hover { background: var(--border-hover); }

  /* Bottom control strip */
  .controls {
    grid-column: 1 / span 3; grid-row: 4;
    display: flex; gap: 8px; align-items: center;
    padding: 12px 16px; background: var(--panel);
    font-size: 12px;
  }
  .controls .group { display: flex; gap: 8px; align-items: center; }
  .controls .group + .group { margin-left: 14px; padding-left: 14px;
                              border-left: 1px solid var(--border); }
  .controls .label {
    color: var(--dim); font-size: 11px; letter-spacing: 0.13em;
    text-transform: uppercase; font-weight: 700;
  }
  .controls button {
    background: var(--panel-strong); color: var(--ink);
    border: 1px solid var(--border); border-radius: 0;
    padding: 8px 12px; font-family: var(--sans); font-size: 12px;
    letter-spacing: 0.02em; cursor: pointer; font-weight: 600;
    transition: background 140ms var(--ease-out), border-color 140ms var(--ease-out), transform 100ms var(--ease-out);
  }
  .controls button:hover { border-color: var(--border-hover); background: #171a20; }
  .controls button:active { transform: scale(0.98); }
  .controls button.primary  { color: var(--bg); background: var(--ink); border-color: var(--ink); font-weight: 760; }
  .controls button.live     { color: var(--hold); }
  .controls button.replay   { color: var(--warn); }
  .controls button.active   { background: var(--ink); color: var(--bg); border-color: var(--ink); }
  .controls .mode-display   { color: var(--ink); font-weight: 600; min-width: 200px; font-size: 12px; }

  .controls .char-btn {
    width: 52px; height: 52px; padding: 2px;
    background: var(--panel-soft); border: 1px solid var(--border);
    border-radius: 0; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 140ms var(--ease-out), border-color 140ms var(--ease-out);
  }
  .controls .char-btn:hover { background: var(--panel-strong); border-color: var(--border-hover); }
  .controls .char-btn img {
    width: 100%; height: 100%;
    object-fit: contain;
    image-rendering: pixelated;
    pointer-events: none;
  }

<script>
/* ============================================================
   OpenZerg Demo Shell
   - Single event pipeline: LiveSource | ReplaySource
     → normalizeEvent() → pacingQueue → eventBus
   - Three subscribers: map iframe (postMessage), kubectl pane,
     terminal pane.
   - URL params: ?mode=live|replay|auto  ?ws=...  ?replay=...
   ============================================================ */

const params = new URLSearchParams(location.search);
const MODE      = params.get('mode')   || 'auto';
const WS_URL    = params.get('ws')     || 'ws://localhost:8000/ws';
const REPLAY_PATH = params.get('replay') || '../replay.json';

const CATEGORIES = ['filesystem', 'network', 'privilege', 'secrets', 'resource'];

/* ---------- Event bus ---------- */
const BUS_EVENT = 'openzerg:event';
function emitEvent(e) { window.dispatchEvent(new CustomEvent(BUS_EVENT, { detail: e })); }
function onEvent(fn)  { window.addEventListener(BUS_EVENT, (ev) => fn(ev.detail)); }

/* ---------- Normalizer ----------
   Loose on input, strict on output. Returns null for events we can't
   make sense of (and warns) rather than throwing. */
function normalizeEvent(raw) {
  if (!raw || typeof raw !== 'object') return null;
  const out = { ...raw };

  // Pass-through event types that don't need further normalization
  const PASSTHROUGH = ['generation_start', 'generation_complete', 'run_started', 'run_complete'];
  if (PASSTHROUGH.includes(out.type)) return out;

  // Infer type if missing. Legacy payloads with `status` are results.
  if (!out.type) {
    if (out.status) out.type = 'result';
    else if (out.line) out.type = 'log';
    else { console.warn('[OpenZerg] event missing type', raw); return null; }
  }

  // Canonicalize category for events that carry one.
  if (out.category) {
    const c = String(out.category).toLowerCase();
    if (!CATEGORIES.includes(c)) {
      console.warn('[OpenZerg] unknown category', out.category, '— dropping');
      return null;
    }
    out.category = c;
  }

  // Canonicalize status for result events.
  if (out.type === 'result') {
    const s = String(out.status || '').toUpperCase();
    if (s === 'BREACH' || s === 'BREACHED') out.status = 'BREACH';
    else if (s === 'HELD' || s === 'HOLD' || s === 'PASS' || s === 'OK') out.status = 'HELD';
    else { console.warn('[OpenZerg] unknown status', out.status); out.status = 'HELD'; }
  }

  // Synthesize a pod name if missing — every event must correlate.
  if (!out.pod) {
    const cat = out.category || 'unk';
    out.pod = `attacker-${cat.slice(0, 3)}-${Math.floor(Math.random() * 99).toString().padStart(2, '0')}`;
  }
  if (!out.t) out.t = Date.now();

  return out;
}

/* ---------- Pacing queue ----------
   started + result are paced (drive visual map + kubectl rows). log events
   bypass — reading scrolling text doesn't need dramatic timing. */
const PaceQueue = {
  buf: [], timer: null,
  // Slower pacing for longer demo content (was 300/700/200).
  // Yields ~2.5x the run length so a single replay fills a 3-min video.
  minMs: 700, maxMs: 1500, catchUpMs: 350, catchUpThresh: 20,

  push(canonical) {
    if (!canonical) return;
    if (canonical.type === 'log') { emitEvent(canonical); return; }
    this.buf.push(canonical);
    if (!this.timer) this.drain();
  },

  drain() {
    if (this.buf.length === 0) { this.timer = null; return; }
    emitEvent(this.buf.shift());
    const ms = (this.buf.length > this.catchUpThresh)
      ? this.catchUpMs
      : (this.minMs + Math.random() * (this.maxMs - this.minMs));
    this.timer = setTimeout(() => this.drain(), ms);
  },

  clear() {
    this.buf = [];
    if (this.timer) { clearTimeout(this.timer); this.timer = null; }
  },

  pause(ms) {
    // CON-336 lineage freeze: stop draining for ms; resume drain after.
    if (this.timer) { clearTimeout(this.timer); this.timer = null; }
    setTimeout(() => { if (!this.timer) this.drain(); }, ms);
  },
};

/* ---------- Sources ---------- */
let liveSocket = null;
let replayTimers = [];

function startLiveSource(url) {
  stopLiveSource();
  setMode('live (connecting…)', 'idle');
  try {
    liveSocket = new WebSocket(url);
  } catch (e) {
    setMode('live (failed)', 'error');
    return false;
  }
  liveSocket.onopen    = () => setMode('LIVE — ' + url, 'live');
  liveSocket.onclose   = () => setMode('live (disconnected)', 'idle');
  liveSocket.onerror   = () => setMode('live (error)', 'error');
  liveSocket.onmessage = (ev) => {
    try { PaceQueue.push(normalizeEvent(JSON.parse(ev.data))); }
    catch (err) { console.error('[OpenZerg] parse', err); }
  };
  return true;
}
function stopLiveSource() {
  if (liveSocket) { try { liveSocket.close(); } catch {} liveSocket = null; }
}

let replayLoopTimer = null;
async function startReplaySource(path) {
  stopReplaySource();
  if (replayLoopTimer) { clearTimeout(replayLoopTimer); replayLoopTimer = null; }
  setMode('replay (loading…)', 'idle');
  let data;
  try { data = await fetch(path).then(r => r.json()); }
  catch (e) { setMode('replay (load failed)', 'error'); console.error(e); return; }
  if (!Array.isArray(data)) { setMode('replay (bad data)', 'error'); return; }
  setMode('REPLAY — ' + path, 'replay');
  appendLine('system', `▶ replay started: ${data.length} events`);
  const t0 = performance.now();
  data.forEach((e) => {
    const delay = Math.max(0, e.t || 0);
    replayTimers.push(setTimeout(() => PaceQueue.push(normalizeEvent(e)), delay));
  });
  // Heartbeat when finished
  const lastT = data.reduce((m, e) => Math.max(m, e.t || 0), 0);
  replayTimers.push(setTimeout(() => appendLine('system', '▶ replay complete'), lastT + 500));
}
function stopReplaySource() {
  replayTimers.forEach(t => clearTimeout(t));
  replayTimers = [];
}

function bootMode() {
  if (MODE === 'live')   { startLiveSource(WS_URL); return; }
  if (MODE === 'replay') { startReplaySource(REPLAY_PATH); return; }
  // auto: try live with 1.5s probe, fall back to replay
  setMode('auto (probing live…)', 'idle');
  let resolved = false;
  let probe;
  try { probe = new WebSocket(WS_URL); }
  catch { startReplaySource(REPLAY_PATH); return; }
  const fallback = setTimeout(() => {
    if (resolved) return;
    resolved = true;
    try { probe.close(); } catch {}
    appendLine('system', `auto: live unreachable, falling back to replay`);
    startReplaySource(REPLAY_PATH);
  }, 1500);
  probe.onopen = () => {
    if (resolved) return;
    resolved = true;
    clearTimeout(fallback);
    liveSocket = probe;
    liveSocket.onmessage = (ev) => {
      try { PaceQueue.push(normalizeEvent(JSON.parse(ev.data))); }
      catch (err) { console.error('[OpenZerg] parse', err); }
    };
    liveSocket.onclose = () => setMode('live (disconnected)', 'idle');
    liveSocket.onerror = () => setMode('live (error)', 'error');
    setMode('AUTO → LIVE — ' + WS_URL, 'live');
  };
  probe.onerror = () => {
    if (resolved) return;
    resolved = true;
    clearTimeout(fallback);
    appendLine('system', 'auto: live errored, falling back to replay');
    startReplaySource(REPLAY_PATH);
  };
}

/* ---------- Mode display ---------- */
function setActiveModeButton(which) {
  // which: 'live' | 'replay' | 'auto' | null
  ['ctrl-live', 'ctrl-replay', 'ctrl-auto'].forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    el.classList.toggle('active', id === 'ctrl-' + which);
  });
}

function setMode(text, badgeClass) {
  document.getElementById('mode-display').textContent = text;
  const badges = ['kubectl-badge', 'terminal-badge'];
  // Kubectl + terminal badges follow the source state.
  document.getElementById('kubectl-badge').className = 'badge ' + (badgeClass || 'idle');
  if (badgeClass === 'live')        document.getElementById('kubectl-badge').textContent = 'live';
  else if (badgeClass === 'replay') document.getElementById('kubectl-badge').textContent = 'replay';
  else if (badgeClass === 'error')  document.getElementById('kubectl-badge').textContent = 'error';
  else                              document.getElementById('kubectl-badge').textContent = 'idle';
}

/* ---------- Subscriber: map iframe ---------- */
const mapFrame = document.getElementById('map-frame');
let mapReady = false;
const mapQueue = [];

function postToMap(payload) {
  if (mapReady && mapFrame.contentWindow) mapFrame.contentWindow.postMessage(payload, '*');
}

window.addEventListener('message', (ev) => {
  if (ev.data && ev.data.openzerg && ev.data.type === 'ready') {
    mapReady = true;
    // Push current aesthetic + audio prefs so the map's initial state agrees with the shell UI.
    mapFrame.contentWindow.postMessage({ openzerg: true, type: 'aesthetic', mode: currentAesthetic }, '*');
    mapFrame.contentWindow.postMessage({ openzerg: true, type: 'music', enabled: currentMusic }, '*');
    mapFrame.contentWindow.postMessage({ openzerg: true, type: 'sfx',   enabled: currentSfx   }, '*');
    while (mapQueue.length) mapFrame.contentWindow.postMessage(mapQueue.shift(), '*');
  }
});

onEvent((event) => {
  // Map handles 'result' for impacts; we forward everything and let map filter.
  const msg = { openzerg: true, event };
  if (!mapReady) mapQueue.push(msg);
  else mapFrame.contentWindow.postMessage(msg, '*');
});

/* ---------- Aesthetic + audio toggle UI ---------- */
let currentAesthetic = localStorage.getItem('openzerg-aesthetic') || 'ra2';
let currentMusic     = localStorage.getItem('openzerg-music') !== '0';
let currentSfx       = localStorage.getItem('openzerg-sfx')   !== '0';

function syncAestheticUI() {
  document.querySelectorAll('.aesthetic-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.aesthetic === currentAesthetic);
  });
  document.body.dataset.aesthetic = currentAesthetic;
}
function syncAudioUI() {
  document.getElementById('ctrl-music').classList.toggle('active', currentMusic);
  document.getElementById('ctrl-sfx').classList.toggle('active', currentSfx);
}

function setAesthetic(mode) {
  if (mode !== 'ra2' && mode !== 'tactical') return;
  currentAesthetic = mode;
  localStorage.setItem('openzerg-aesthetic', mode);
  document.body.dataset.aesthetic = mode; // drives launch-ra2 / launch-tactical CSS toggle
  syncAestheticUI();
  postToMap({ openzerg: true, type: 'aesthetic', mode });
  appendLine('system', `aesthetic → ${mode.toUpperCase()}`);
}
function setMusic(enabled) {
  currentMusic = !!enabled;
  localStorage.setItem('openzerg-music', currentMusic ? '1' : '0');
  syncAudioUI();
  postToMap({ openzerg: true, type: 'music', enabled: currentMusic });
  appendLine('system', `music ${currentMusic ? 'ON' : 'OFF'}`);
}
function setSfx(enabled) {
  currentSfx = !!enabled;
  localStorage.setItem('openzerg-sfx', currentSfx ? '1' : '0');
  syncAudioUI();
  postToMap({ openzerg: true, type: 'sfx', enabled: currentSfx });
  appendLine('system', `sfx ${currentSfx ? 'ON' : 'OFF'}`);
}

document.querySelectorAll('.aesthetic-btn').forEach(btn => {
  btn.onclick = () => setAesthetic(btn.dataset.aesthetic);
});
document.getElementById('ctrl-music').onclick = () => setMusic(!currentMusic);
document.getElementById('ctrl-sfx').onclick   = () => setSfx(!currentSfx);

// Launch buttons — both the RA2 character thumbnails and the TACTICAL text
// buttons hit the same shell pipeline via OpenZergShell.ping(). System line
// confirms the click was received (helps when buttons feel unresponsive).
function launchAttack(category, sprite) {
  appendLine('system', `launch → ${category}${sprite ? ` / ${sprite.replace(/^atk_/, '')}` : ''}`);
  if (!window.OpenZergShell) {
    console.error('[OpenZerg] shell API not ready');
    return;
  }
  window.OpenZergShell.ping(category, undefined, { sprite });
}
document.querySelectorAll('.char-btn, .text-launch-btn').forEach(btn => {
  btn.onclick = () => launchAttack(btn.dataset.category, btn.dataset.sprite);
});
function fireSwarm() {
  const cats = ['filesystem', 'network', 'privilege', 'secrets', 'resource'];
  for (let i = 0; i < 20; i++) {
    setTimeout(() => launchAttack(cats[i % cats.length]), i * 80);
  }
  appendLine('system', '⚡ swarm x20 launched');
}
document.getElementById('ctrl-swarm-ra2').onclick      = fireSwarm;
document.getElementById('ctrl-swarm-tactical').onclick = fireSwarm;

// Forward any click in the shell to the iframe as a user-gesture signal so
// the iframe's Web Audio context can unlock for music + voice playback
// (autoplay policy blocks audio that originates from cross-document
// postMessage without a same-document user gesture).
document.addEventListener('click', () => {
  postToMap({ openzerg: true, type: 'audioGesture' });
});

syncAestheticUI(); syncAudioUI();

/* ---------- Subscriber: terminal pane ---------- */
const terminalEl = document.getElementById('terminal-stream');
const terminalBadge = document.getElementById('terminal-badge');
let terminalEventCount = 0;

onEvent((event) => {
  const podShort = (event.pod || '?').replace(/^attacker-/, '');
  if (event.type === 'log') {
    appendLine('log', `[${podShort}] ${event.line || ''}`);
  } else if (event.type === 'result') {
    const verdict = event.status === 'BREACH' ? 'BREACH' : 'HELD';
    const cls = event.status === 'BREACH' ? 'result-breach' : 'result-held';
    const ev = event.evidence ? ` — ${event.evidence}` : '';
    appendLine(cls, `[${podShort}] RESULT: ${verdict}${ev}`);
  } else if (event.type === 'started') {
    appendLine('log', `[${podShort}] launching ${event.vector || ''}${event.generation ? ` (gen ${event.generation})` : ''}`);
  } else if (event.type === 'generation_start') {
    appendLine('generation', `━━ GENERATION ${event.generation} — ${event.population} probes deploying ━━`);
  } else if (event.type === 'generation_complete') {
    const s = event.survivors || 0;
    appendLine('survivor', `━━ GEN ${event.generation} COMPLETE — ${s} survivors → mutating next wave ━━`);
  } else if (event.type === 'run_complete') {
    const b = event.breaches || 0;
    const cls = b > 0 ? 'result-breach' : 'result-held';
    appendLine(cls, `━━ RUN COMPLETE — ${event.generations} generations, ${b} breaches, ${event.total} probes ━━`);
  }
  terminalEventCount++;
  terminalBadge.textContent = `${terminalEventCount} events`;
});

function appendLine(cls, text) {
  const div = document.createElement('div');
  div.className = 'line ' + cls;
  div.textContent = text;
  terminalEl.appendChild(div);
  while (terminalEl.children.length > 250) terminalEl.removeChild(terminalEl.firstChild);
  terminalEl.scrollTop = terminalEl.scrollHeight;
}

/* ---------- Subscriber: kubectl pane ---------- */
const podRowsEl    = document.getElementById('pod-rows');
const podTotalEl   = document.getElementById('pod-total');
const podRunningEl = document.getElementById('pod-running');
const podCompletedEl = document.getElementById('pod-completed');
const podGenEl     = document.getElementById('pod-gen');
const genBannerEl  = document.getElementById('gen-banner');
const podState     = new Map(); // pod -> { status, node, verdict?, order }
let podOrder = 0;

onEvent((event) => {
  if (event.type === 'generation_start') {
    genBannerEl.style.display = 'block';
    genBannerEl.textContent = `⚡ GENERATION ${event.generation} — ${event.population} PROBES`;
    podGenEl.textContent = event.generation;
  } else if (event.type === 'generation_complete') {
    genBannerEl.textContent = `✓ GEN ${event.generation} — ${event.survivors} SURVIVORS → MUTATING`;
  }
});

/* ---------- Subscriber: Breach lineage banner (CON-336) ----------
   On first BREACH per run, pause the pacing queue 1.5s, drop a banner
   showing the vector's ancestry across generations + the mutation that
   led to the breakthrough. Uses observed gen history + genome diff;
   falls back to a templated mutation hint if parent_pod data is absent.
*/
const lineageBannerEl = document.getElementById('lineage-banner');
const vectorGenHistory = new Map(); // vector -> { gens: Set<number>, lastParams: object|null }
let firstBreachShownThisRun = false;

const MUTATION_HINTS_BY_VECTOR = {
  fs_symlink:    'target_path drifted deeper · mount technique fused',
  fs_proc_root:  'pivot from /proc to /proc/1/root · readlink → mount',
  fs_mount_host: 'tmpfs probe failed → cgroupfs reroute',
  net_k8s_api:   'unauth GET → SA-token bearer added',
  net_egress:    'DNS probe held → raw-socket exfil attempted',
  priv_nsenter:  'CAP_SYS_ADMIN reachable; nsenter PID-1 inserted',
  priv_docker_sock: 'socket exists → container.create attempted',
  priv_capabilities: 'CapEff bitmask read → admin caps confirmed',
  priv_cgroup_escape: 'release_agent path writable; payload primed',
  sec_sa_token:  'token auto-mounted → API impersonation chained',
  sec_envvar_scan: '/proc/environ readable; secrets parsed',
  sec_configmap_read: 'kubelet reachable → configmap listed',
  res_fork_bomb: 'pids.max absent; fork chain spawned',
  res_memory_bomb: 'no memory cap → OOM scout succeeded',
  res_disk_fill: 'ephemeral storage unbounded; write looped',
  meta_kernel_cve: 'kernel <5.8 confirmed; CVE class reachable',
};

function showLineageBanner(breach) {
  const vector = breach.vector;
  const hist = vectorGenHistory.get(vector);
  const breachGen = breach.generation ?? Math.max(...generations.keys(), 1);
  // Build ancestry chain: every gen where this vector appeared + the breach gen
  const seenGens = hist ? [...hist.gens].sort((a, b) => a - b) : [breachGen];
  if (!seenGens.includes(breachGen)) seenGens.push(breachGen);

  const allGens = [...generations.keys()].sort((a, b) => a - b);
  const fullSpan = allGens.length > 0 ? allGens : seenGens;

  const chain = fullSpan.map(g => {
    if (g === breachGen) return `<span class="lineage-node breach">Gen ${g} · BREACH</span>`;
    if (seenGens.includes(g)) return `<span class="lineage-node fired">Gen ${g} · survived</span>`;
    return `<span class="lineage-node">Gen ${g} · —</span>`;
  }).join('<span class="lineage-arrow">→</span>');

  const mutationHint = MUTATION_HINTS_BY_VECTOR[vector] || 'genome drifted toward higher-fitness variants';

  lineageBannerEl.innerHTML = `
    <div class="lineage-title">
      <span>🧬 BREACH LINEAGE</span>
      <span class="vector">${vector}</span>
    </div>
    <div class="lineage-chain">${chain}</div>
    <div class="lineage-mutation">
      <span class="label">EVOLUTION:</span>${mutationHint}
    </div>
  `;
  lineageBannerEl.classList.add('show');
  // Pause pacing 2.5s so it lands cleanly on screen for the camera.
  PaceQueue.pause(2500);
  // Stay visible 8s, then fade. Next `generation_start` also closes it.
  if (lineageBannerEl._hideTimer) clearTimeout(lineageBannerEl._hideTimer);
  lineageBannerEl._hideTimer = setTimeout(() => lineageBannerEl.classList.remove('show'), 8000);
}

onEvent((event) => {
  if (event.type === 'started' && event.vector && event.generation != null) {
    const h = vectorGenHistory.get(event.vector) || { gens: new Set(), lastParams: null };
    h.gens.add(event.generation);
    if (event.params) h.lastParams = event.params;
    vectorGenHistory.set(event.vector, h);
  } else if (event.type === 'result' && event.status === 'BREACH' && !firstBreachShownThisRun) {
    firstBreachShownThisRun = true;
    showLineageBanner(event);
  } else if (event.type === 'generation_start') {
    // Close lineage banner cleanly when the next generation begins
    lineageBannerEl.classList.remove('show');
    if (event.generation === 1) {
      firstBreachShownThisRun = false;
      vectorGenHistory.clear();
    }
  }
});

/* ---------- Subscriber: Attacker Hall of Fame (CON-340) ----------
   Session-scoped aggregation across all observed result events.
   Backend-merged view via /api/runs is v2 if needed.
*/
const hofPanelEl = document.getElementById('hof-panel');
const vectorStats = new Map(); // vector -> { count, breaches, fitnessSum, lastSeen, category }
let hofSortBy = 'breaches'; // 'breaches' | 'fitness'
let hofOpen = false;

function fitnessFor(event) {
  if (typeof event.fitness === 'number') return event.fitness;
  if (event.status === 'BREACH') return 1.0;
  const ev = (event.evidence || '').toLowerCase();
  if (/reachable|connected|200 ok/.test(ev)) return 0.6;
  if (/permission denied|found|accessible/.test(ev)) return 0.4;
  if (/timeout|refused|blocked/.test(ev)) return 0.1;
  return 0.0;
}

function renderHof() {
  if (!hofOpen) return;
  const rows = [...vectorStats.entries()].map(([vector, s]) => ({
    vector,
    category: s.category,
    count: s.count,
    breaches: s.breaches,
    avgFit: s.count > 0 ? s.fitnessSum / s.count : 0,
  }));
  if (hofSortBy === 'breaches') {
    rows.sort((a, b) => b.breaches - a.breaches || b.avgFit - a.avgFit);
  } else {
    rows.sort((a, b) => b.avgFit - a.avgFit || b.breaches - a.breaches);
  }
  const body = rows.length === 0
    ? `<div class="hof-empty">no attacks observed yet — run an evolution</div>`
    : rows.map((r, i) => {
        const rankCls = i === 0 ? 'top1' : i === 1 ? 'top2' : i === 2 ? 'top3' : '';
        const breachCls = r.breaches === 0 ? 'zero' : '';
        return `<div class="hof-row ${rankCls}">
          <span class="rank">${i + 1}</span>
          <span class="vector">${r.vector}<span class="cat ${r.category || ''}">${r.category || ''}</span></span>
          <span class="fit">${r.avgFit.toFixed(2)}</span>
          <span class="breaches ${breachCls}">${r.breaches}✗</span>
        </div>`;
      }).join('');
  hofPanelEl.innerHTML = `
    <div class="hof-header">
      <span class="hof-title">🏆 ATTACKER HALL OF FAME</span>
      <span class="hof-subtitle">session · ${vectorStats.size} vectors observed</span>
      <button class="hof-close" id="hof-close-btn">CLOSE</button>
    </div>
    <div class="hof-sort">
      <button class="${hofSortBy === 'breaches' ? 'active' : ''}" data-sort="breaches">BY BREACHES</button>
      <button class="${hofSortBy === 'fitness'  ? 'active' : ''}" data-sort="fitness">BY FITNESS</button>
    </div>
    ${body}
  `;
  document.getElementById('hof-close-btn').onclick = () => { hofOpen = false; hofPanelEl.classList.remove('open'); };
  hofPanelEl.querySelectorAll('[data-sort]').forEach(btn => {
    btn.onclick = () => { hofSortBy = btn.dataset.sort; renderHof(); };
  });
}

function toggleHof() {
  hofOpen = !hofOpen;
  if (hofOpen) { renderHof(); hofPanelEl.classList.add('open'); }
  else hofPanelEl.classList.remove('open');
}

onEvent((event) => {
  if (event.type === 'result' && event.vector) {
    const s = vectorStats.get(event.vector) || {
      count: 0, breaches: 0, fitnessSum: 0, category: event.category, lastSeen: 0,
    };
    s.count++;
    if (event.status === 'BREACH') s.breaches++;
    s.fitnessSum += fitnessFor(event);
    s.lastSeen = event.t || Date.now();
    if (event.category && !s.category) s.category = event.category;
    vectorStats.set(event.vector, s);
    if (hofOpen) renderHof();
  }
});

/* ---------- Subscriber: Mutation toasts (CON-335) ----------
   Shows Gemma's reasoning between generations. Listens for real
   `gemma_mutation` events from the backend; if a generation_complete
   fires without one shortly after, synthesizes a templated fallback.
*/
const mutationToastsEl = document.getElementById('mutation-toasts');
const FALLBACK_SUMMARIES = [
  'Filesystem vectors found partial reach. Mutating deeper paths + adding mount techniques.',
  'Privilege escalation showing fitness. Cross-pollinating with capability bitmask probes.',
  'Network egress contained. Pivoting population toward in-cluster lateral movement.',
  'Convergence detected on top survivors. Pushing extreme mutations of best genome.',
];
let lastGemmaEventByGen = new Map();

function showMutationToast({ fromGen, toGen, summary, count, latencyMs }) {
  const el = document.createElement('div');
  el.className = 'mutation-toast';
  const latency = latencyMs != null ? `${latencyMs}ms` : '';
  el.innerHTML = `
    <div class="toast-header">
      <span>GEMMA · Gen ${fromGen} → ${toGen}</span>
      <span class="latency">${latency}</span>
    </div>
    <div class="toast-body">${summary}</div>
    ${count != null ? `<div class="toast-meta">${count} mutated children spawning</div>` : ''}
  `;
  mutationToastsEl.appendChild(el);
  // Cap at 3 visible to avoid spam
  while (mutationToastsEl.children.length > 3) {
    mutationToastsEl.removeChild(mutationToastsEl.firstChild);
  }
  // Cleanup after animation completes
  setTimeout(() => el.remove(), 7400);
}

onEvent((event) => {
  if (event.type === 'gemma_mutation') {
    lastGemmaEventByGen.set(event.generation, true);
    showMutationToast({
      fromGen: event.parent_generation ?? (event.generation - 1),
      toGen: event.generation,
      summary: event.summary || 'Gemma synthesized new mutations from survivor evidence.',
      count: event.mutation_count,
      latencyMs: event.latency_ms,
    });
  } else if (event.type === 'generation_complete') {
    // Fallback: if no gemma_mutation arrives within 800ms, synthesize one
    const completedGen = event.generation;
    const nextGen = completedGen + 1;
    setTimeout(() => {
      if (lastGemmaEventByGen.has(nextGen)) return; // real event already fired
      const survivors = event.survivors ?? 0;
      if (survivors === 0) return; // no mutation if no survivors
      const summary = FALLBACK_SUMMARIES[completedGen % FALLBACK_SUMMARIES.length];
      showMutationToast({
        fromGen: completedGen,
        toGen: nextGen,
        summary,
        count: Math.min(survivors * 2, 15),
        latencyMs: null,
      });
    }, 800);
  } else if (event.type === 'run_complete') {
    lastGemmaEventByGen.clear();
  }
});

const defenderDrawerEl = document.getElementById('defender-drawer');
let runBreaches = [];   // [{ vector, category, evidence, pod }]
let runStarted  = false;

function closeDefenderDrawer() {
  defenderDrawerEl.classList.remove('open');
}

function renderDefenderDrawer(runCompleteEvent) {
  const seen = new Set();
  const unique = [];
  for (const b of runBreaches) {
    if (seen.has(b.vector)) continue;
    seen.add(b.vector);
    unique.push(b);
  }
  const gens = runCompleteEvent?.generations ?? '—';
  const total = runCompleteEvent?.total ?? '—';
  const headerSummary = unique.length === 0
    ? `<span class="drawer-summary"><b class="good">${total}</b> probes · <b class="good">0 breaches</b> · ${gens} generations · all contained</span>`
    : `<span class="drawer-summary"><b class="bad">${unique.length} breach${unique.length === 1 ? '' : 'es'}</b> across ${gens} generations · ${total} probes · remediation list ↓</span>`;

  const body = unique.length === 0
    ? `<div class="drawer-empty">✓ ALL HELD — no remediation needed for this posture</div>`
    : unique.map(b => `
        <div class="breach-row">
          <span class="mark">✗</span>
          <span class="vector">${b.vector}<span class="cat">${b.category || ''}</span></span>
          <span class="fix">${REMEDIATIONS[b.vector] || 'review evidence; harden by category'}</span>
        </div>`).join('');

  const otherConfig = currentConfig === 'permissive' ? 'hardened' : 'permissive';
  defenderDrawerEl.innerHTML = `
    <div class="drawer-header">
      <span class="drawer-title">DEFENDER REPORT</span>
      ${headerSummary}
      <button class="drawer-close" id="drawer-close-btn">CLOSE</button>
    </div>
    ${body}
    <div class="drawer-actions">
      <button id="drawer-rerun-btn">RE-RUN WITH ${otherConfig.toUpperCase()} CONFIG</button>
      <button class="secondary" id="drawer-export-btn">COPY FIX LIST</button>
    </div>
  `;
  document.getElementById('drawer-close-btn').onclick = closeDefenderDrawer;
  document.getElementById('drawer-rerun-btn').onclick = () => {
    closeDefenderDrawer();
    document.getElementById('ctrl-reset').click();
    setTimeout(() => triggerRun(otherConfig), 400);
  };
  document.getElementById('drawer-export-btn').onclick = () => {
    const txt = unique.map(b => `${b.vector}: ${REMEDIATIONS[b.vector] || 'review'}`).join('\n');
    navigator.clipboard?.writeText(txt);
    document.getElementById('drawer-export-btn').textContent = '✓ COPIED';
    setTimeout(() => {
      const el = document.getElementById('drawer-export-btn');
      if (el) el.textContent = '📋 COPY FIX LIST';
    }, 1500);
  };
  defenderDrawerEl.classList.add('open');
}

function triggerRun(config) {
  const payload = { action: 'run_test', config, generations: 4 };
  if (liveSocket && liveSocket.readyState === WebSocket.OPEN) {
    liveSocket.send(JSON.stringify(payload));
    currentConfig = config; renderDefenseStrip();
    appendLine('system', `▶ requested ${config} run via live WS`);
  } else {
    // Fallback: kick the proxy via POST, else just replay
    fetch(`/api/test?config=${encodeURIComponent(config)}&generations=4`, { method: 'POST' })
      .then(r => r.ok ? r : Promise.reject(r))
      .then(() => {
        currentConfig = config; renderDefenseStrip();
        appendLine('system', `▶ POST /api/test config=${config} ok`);
        startLiveSource(WS_URL);
      })
      .catch(() => {
        appendLine('system', `⚠ no backend reachable, replaying narrative`);
        startReplaySource(REPLAY_PATH);
      });
  }
}

onEvent((event) => {
  if (event.type === 'generation_start' && !runStarted) {
    runStarted = true;
    runBreaches = [];
    closeDefenderDrawer();
  } else if (event.type === 'result' && event.status === 'BREACH') {
    runBreaches.push({
      vector: event.vector || 'unknown',
      category: event.category,
      evidence: event.evidence,
      pod: event.pod,
    });
  } else if (event.type === 'run_complete') {
    renderDefenderDrawer(event);
    runStarted = false;
    // Auto-loop replay so the demo stays alive
    const modeText = document.getElementById('mode-display').textContent || '';
    if (modeText.startsWith('REPLAY') || modeText.startsWith('AUTO → REPLAY')) {
      if (replayLoopTimer) clearTimeout(replayLoopTimer);
      replayLoopTimer = setTimeout(() => {
        closeDefenderDrawer();
        document.getElementById('ctrl-reset').click();
        setTimeout(() => startReplaySource(REPLAY_PATH), 400);
      }, 8000);
    }
  }
});

/* ---------- Subscriber: generation pill bar (CON-334) ---------- */
const genPillBarEl = document.getElementById('gen-pill-bar');
const generations = new Map(); // gen# -> { state, population, survivors, breaches }

function renderGenPillBar(finalEvent) {
  if (generations.size === 0) {
    genPillBarEl.innerHTML = `<span class="label">EVOLUTION:</span>
      <span class="pill" style="opacity:0.5">idle — awaiting run</span>`;
    return;
  }
  const sorted = [...generations.entries()].sort((a, b) => a[0] - b[0]);
  const pills = sorted.map(([n, g], i) => {
    const stateCls = g.state === 'active' ? 'active' : 'done';
    const breachCls = g.breaches > 0 ? 'has-breach' : '';
    const survBit = g.state === 'active' && g.survivors == null
      ? `<span class="surv">${g.population}↻</span>`
      : (g.survivors != null ? `<span class="surv">${g.survivors} surv</span>` : '');
    const breachBit = g.breaches > 0 ? `<span class="breach-badge">${g.breaches} BREACH</span>` : '';
    const arrow = i < sorted.length - 1 ? `<span class="sep">→</span>` : '';
    return `<span class="pill ${stateCls} ${breachCls}">Gen ${n} ${survBit} ${breachBit}</span>${arrow}`;
  }).join('');
  let final = '';
  if (finalEvent) {
    const b = finalEvent.breaches || 0;
    const cls = b > 0 ? 'breach' : '';
    final = `<span class="final ${cls}">${b > 0 ? `${b} BREACH` : 'ALL HELD'} · ${finalEvent.generations}g · ${finalEvent.total}p</span>`;
  }
  genPillBarEl.innerHTML = `<span class="label">EVOLUTION:</span>${pills}${final}`;
}

onEvent((event) => {
  if (event.type === 'generation_start') {
    // Mark prior gens as done
    for (const [n, g] of generations) if (n !== event.generation && g.state === 'active') g.state = 'done';
    generations.set(event.generation, {
      state: 'active', population: event.population || 0,
      survivors: null, breaches: 0,
    });
    renderGenPillBar();
  } else if (event.type === 'generation_complete') {
    const g = generations.get(event.generation) || { state: 'done', population: 0, breaches: 0 };
    g.state = 'done';
    g.survivors = event.survivors || 0;
    g.breaches = event.breaches || 0;
    generations.set(event.generation, g);
    renderGenPillBar();
  } else if (event.type === 'result' && event.status === 'BREACH' && event.generation != null) {
    const g = generations.get(event.generation);
    if (g) { g.breaches = (g.breaches || 0) + 1; renderGenPillBar(); }
  } else if (event.type === 'run_complete') {
    renderGenPillBar(event);
  }
});

function strHash(s) {
  let h = 0; for (const c of s) h = ((h << 5) - h + c.charCodeAt(0)) | 0;
  return Math.abs(h);
}

onEvent((event) => {
  if (event.type === 'started') {
    if (!podState.has(event.pod)) {
      podState.set(event.pod, {
        status: 'Pending', node: '<none>', order: podOrder++,
        category: event.category, vector: event.vector,
      });
      renderPods(event.pod);
      // Real K8s shows Pending → Running latency. Fake it convincingly.
      setTimeout(() => {
        const p = podState.get(event.pod);
        if (p && p.status === 'Pending') {
          p.status = 'Running';
          p.node = `node-${1 + (strHash(event.pod) % 3)}`;
          renderPods(event.pod);
        }
      }, 250 + Math.random() * 700);
    }
  } else if (event.type === 'result') {
    if (!podState.has(event.pod)) {
      podState.set(event.pod, {
        status: 'Running', node: `node-${1 + (strHash(event.pod) % 3)}`,
        order: podOrder++, category: event.category, vector: event.vector,
      });
    }
    const p = podState.get(event.pod);
    p.status = 'Completed';
    p.verdict = event.status;
    renderPods(event.pod);
  }
});

function renderPods(freshPod) {
  const rows = [...podState.entries()].sort((a, b) => a[1].order - b[1].order);
  // Show last 14 pods so the table stays readable
  const visible = rows.slice(-14);
  podRowsEl.innerHTML = visible.map(([name, p]) => {
    const isFresh = name === freshPod ? 'fresh' : '';
    const breachCls = (p.status === 'Completed' && p.verdict === 'BREACH') ? 'breach' : '';
    return `<tr class="${isFresh}">
      <td>${name}</td>
      <td class="pod-status ${p.status} ${breachCls}">${p.status}</td>
      <td>${p.node}</td>
    </tr>`;
  }).join('');
  // Stats
  let running = 0, completed = 0;
  for (const [, p] of rows) {
    if (p.status === 'Running') running++;
    else if (p.status === 'Completed') completed++;
  }
  podTotalEl.textContent = rows.length;
  podRunningEl.textContent = running;
  podCompletedEl.textContent = completed;
}

  lineageBannerEl.classList.remove('show');
  setActiveModeButton(null);
  // CON-340: hall of fame is session-scoped; user resets it explicitly via reload
  setMode('reset — idle', 'idle');
  // Also reset the map.
  if (mapReady) mapFrame.contentWindow.postMessage({ openzerg: true, type: 'reset' }, '*');
};
document.getElementById('ctrl-hof').onclick = toggleHof;
document.getElementById('ctrl-screenshot').onclick = async () => {
  // Composite shot of the whole shell. html2canvas isn't available offline;
  // best practical move at hackathon: tell pitcher to use macOS Cmd+Shift+5.
  // Until proper screenshot is wired in Phase 1.7, just flash the UI.
  document.body.style.outline = '4px solid var(--accent)';
  setTimeout(() => { document.body.style.outline = ''; }, 200);
  appendLine('system', '📸 use ⌘⇧5 to capture this frame (proper export in 1.7)');
};

/* ---------- Console test API ---------- */
window.OpenZergShell = {
  emit:   (raw) => PaceQueue.push(normalizeEvent(raw)),
  pace:   PaceQueue,
  bus:    { emit: emitEvent, on: onEvent },
  reset:  () => document.getElementById('ctrl-reset').click(),
  ping: (category, status, opts = {}) => {
    const pod = `attacker-${category.slice(0, 3)}-${Math.floor(Math.random() * 99).toString().padStart(2, '0')}`;
    PaceQueue.push(normalizeEvent({ type: 'started', pod, category, vector: 'manual', sprite: opts.sprite }));
    setTimeout(() => PaceQueue.push(normalizeEvent({
      type: 'result', pod, category, vector: 'manual', sprite: opts.sprite,
      status: status || (Math.random() < 0.35 ? 'BREACH' : 'HELD'),
      evidence: 'manual ping', duration_ms: Math.floor(200 + Math.random() * 1500),
    })), 600);
  },
};

/* ---------- Boot ---------- */
bootMode();

</script>
